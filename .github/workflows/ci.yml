name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m py_compile main.py p53_ppi_project/*.py

      - name: Run TP53 pipeline
        run: python main.py

      - name: Upload processed outputs
        uses: actions/upload-artifact@v4
        with:
          name: tp53-processed-outputs
          path: |
            data/processed/ppi
            data/processed/gnn

